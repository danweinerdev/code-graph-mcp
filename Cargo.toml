[workspace]
resolver = "3"
members = [
    "crates/code-graph-mcp",
    "crates/codegraph-core",
    "crates/codegraph-lang",
    "crates/codegraph-graph",
    "crates/codegraph-tools",
    "crates/codegraph-lang-cpp",
    "crates/codegraph-lang-rust",
    "crates/codegraph-lang-go",
    "crates/codegraph-lang-python",
    "crates/codegraph-parse-test",
]

[workspace.package]
edition = "2021"
license = "MIT"
repository = "https://github.com/danielwco/code-graph-mcp"
rust-version = "1.84"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2"
toml = "0.8"
tempfile = "3"
tree-sitter = "0.26"
tree-sitter-cpp = "=0.23.4"
streaming-iterator = "0.1"
rstest = "0.21"
pretty_assertions = "1"
walkdir = "2"
regex = "1.12"
